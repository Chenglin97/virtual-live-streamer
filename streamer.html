<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Virtual Live Streamer - Aria</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; background: #1a1a2e; color: white; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

    #container { display: flex; width: 100%; height: 100%; }

    /* Avatar panel */
    #avatar-panel { flex: 1; position: relative; }
    #avatar { width: 100%; height: 100%; }

    /* Top bar */
    #topbar { position: absolute; top: 0; left: 0; right: 0; height: 50px; background: rgba(0,0,0,0.6);
              display: flex; align-items: center; padding: 0 15px; z-index: 10; }
    #live-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff0000; margin-right: 8px;
                animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    #live-text { color: #ff0000; font-weight: bold; font-size: 16px; margin-right: 20px; }
    #streamer-name { font-size: 16px; color: #fff; }
    #viewer-count { margin-left: auto; color: #aaa; font-size: 14px; }

    /* Chat panel */
    #chat-panel { width: 340px; background: #0e0e1a; display: flex; flex-direction: column; border-left: 1px solid #333; }
    #chat-header { padding: 12px 15px; background: #16162a; font-size: 14px; font-weight: bold; border-bottom: 1px solid #333; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 10px 15px; font-size: 13px; }
    .chat-msg { margin-bottom: 8px; line-height: 1.4; }
    .chat-user { font-weight: bold; margin-right: 6px; }
    .chat-system { color: #888; font-style: italic; }

    #chat-input-area { padding: 10px; border-top: 1px solid #333; display: flex; gap: 8px; }
    #chat-input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #1a1a2e; color: white; font-size: 13px; }
    #chat-send { padding: 8px 16px; border-radius: 6px; border: none; background: #7c3aed; color: white; cursor: pointer; font-size: 13px; }
    #chat-send:hover { background: #6d28d9; }

    /* Agent status */
    #status { position: absolute; bottom: 60px; left: 15px; background: rgba(0,0,0,0.5); padding: 6px 12px;
              border-radius: 20px; font-size: 12px; color: #aaa; z-index: 10; }
    #debug { display: none; }

    /* Loading overlay */
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
               font-size: 18px; color: #aaa; z-index: 20; }
  </style>

  <script type="importmap">
  { "imports":
    {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from "talkinghead";

    let head;
    let agentApiUrl = 'http://localhost:5001'; // Backend server

    // ── Initialize Avatar ──
    document.addEventListener('DOMContentLoaded', async function() {
      const nodeAvatar = document.getElementById('avatar');
      const nodeLoading = document.getElementById('loading');

      head = new TalkingHead(nodeAvatar, {
        ttsEndpoint: null, // We'll use speakAudio instead
        lipsyncModules: ["en"],
        cameraView: "upper",
        cameraDistance: 0.4,
        cameraX: 0,
        cameraY: 0,
        cameraRotateX: 0
      });

      try {
        nodeLoading.textContent = "Loading avatar...";

        // Use the bundled brunette avatar
        await head.showAvatar({
          url: './avatars/brunette.glb',
          body: 'F',
          avatarMood: 'happy',
          lipsyncLang: 'en'
        }, (ev) => {
          if (ev.lengthComputable) {
            let pct = Math.min(100, Math.round(ev.loaded / ev.total * 100));
            nodeLoading.textContent = "Loading avatar " + pct + "%";
          }
        });

        nodeLoading.style.display = 'none';
        addChatMessage('System', 'Avatar loaded! Type a message to chat.', '#888');
        setStatus('Idle — waiting for chat');

        // Start idle behavior (gestures/moods) + Twitch feed polling
        // NOTE: idle TALK is handled by the Twitch bridge, not the frontend
        startIdleBehavior();
        startFeedPoller();

      } catch (error) {
        console.error(error);
        nodeLoading.textContent = "Error: " + error.toString();
      }

      // ── Chat input ──
      const chatInput = document.getElementById('chat-input');
      const chatSend = document.getElementById('chat-send');

      // Resume audio context on first real user interaction
      async function resumeAudio() {
        try {
          if (head && head.audioCtx && head.audioCtx.state === 'suspended') {
            await head.audioCtx.resume();
            console.log('AudioContext resumed');
          }
        } catch(e) { console.log('Audio resume:', e); }
      }

      chatSend.addEventListener('click', async () => { await resumeAudio(); sendChat(); });
      chatInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') { await resumeAudio(); sendChat(); }
      });

      // Also resume on any click on the page
      document.addEventListener('click', resumeAudio, { once: true });
    });

    // ── Chat handling ──
    async function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      lastChatTime = Date.now();
      feedSourceMessages.add(text); // mark so feed poller skips it
      const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      addChatMessage('You', text, color);

      // Get AI response from backend
      setStatus('Thinking...');
      try {
        const resp = await fetch(agentApiUrl + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'viewer', message: text })
        });
        const data = await resp.json();
        if (data.response) {
          if (data.mood && head) {
            try { head.setMood(data.mood); } catch(e) {}
          }
          await speakResponse(data.response, data.audio_url);
        }
      } catch (e) {
        console.error('Backend unavailable, using local:', e);
        await speakResponse(getLocalResponse(text), null);
      }
    }

    // ── Local response generation (no backend needed) ──
    function getLocalResponse(input) {
      const lower = input.toLowerCase();
      const responses = {
        'hello': "Hey there! Welcome to the stream! So glad you stopped by!",
        'hi': "Hi! Great to see you here! How's your day going?",
        'how are you': "I'm doing great, thanks for asking! Just hanging out and chatting with everyone.",
        'what are you doing': "Just vibing and chatting with my amazing audience! What about you?",
        'bye': "Aww, leaving already? Come back soon! It was great chatting with you!",
        'love': "That's so sweet! You're making me blush!",
        'cute': "Oh stop it, you're too kind! But I appreciate the compliment!",
      };

      for (const [key, resp] of Object.entries(responses)) {
        if (lower.includes(key)) return resp;
      }

      const generic = [
        "That's really interesting! Tell me more about that!",
        "Haha, you're funny! I love chatting with you all!",
        "Ooh, great question! Let me think about that for a sec...",
        "You know what, I totally agree with that!",
        "That's a really cool thought! I hadn't considered that before.",
        "Wow, that's awesome! Thanks for sharing!",
      ];
      return generic[Math.floor(Math.random() * generic.length)];
    }

    // ── Debug helper ──
    function dbg(msg) {
      const el = document.getElementById('debug');
      if (el) {
        el.textContent += msg + '\n';
        el.scrollTop = el.scrollHeight;
      }
      console.log('[DBG]', msg);
    }

    // ── Speech queue — only one clip at a time ──
    let speechQueue = [];
    let isProcessingSpeech = false;

    async function speakResponse(text, audioUrl) {
      // Add to queue instead of playing immediately
      speechQueue.push({ text, audioUrl });
      processNextSpeech();
    }

    async function processNextSpeech() {
      if (isProcessingSpeech || speechQueue.length === 0) return;

      isProcessingSpeech = true;
      isSpeaking = true;
      const { text, audioUrl } = speechQueue.shift();

      setStatus('Speaking...');
      addChatMessage('Aria', text, '#ff69b4');

      try {
        if (audioUrl && head) {
          // Resume audio context if suspended
          if (head.audioCtx && head.audioCtx.state === 'suspended') {
            await head.audioCtx.resume();
          }

          // Stop any currently playing speech first
          try { head.stopSpeaking(); } catch(e) {}

          // Fetch and decode audio
          const response = await fetch(agentApiUrl + audioUrl);
          const arrayBuffer = await response.arrayBuffer();
          const audioBuffer = await head.audioCtx.decodeAudioData(arrayBuffer);

          // Build word timings
          const cleanText = text.replace(/[\u{10000}-\u{10FFFF}]/gu, '').replace(/\*/g, '').trim();
          const words = cleanText.split(/\s+/).filter(w => w.length > 0);
          const audioDurationMs = audioBuffer.duration * 1000;
          const msPerWord = words.length > 0 ? audioDurationMs / words.length : 200;

          const audioObj = {
            audio: audioBuffer,
            words: words,
            wtimes: words.map((w, i) => i * msPerWord),
            wdurations: words.map(() => Math.max(100, msPerWord * 0.9)),
            markers: [],
            mtimes: [],
          };

          head.speakAudio(audioObj, { lipsyncLang: 'en' });

          // Wait for the audio to finish before processing next
          await new Promise(resolve => setTimeout(resolve, audioDurationMs + 500));

        }
      } catch (e) {
        console.error('Speech error:', e);
        if (audioUrl) {
          try {
            const fallbackAudio = new Audio(agentApiUrl + audioUrl);
            await fallbackAudio.play();
            await new Promise(resolve => fallbackAudio.addEventListener('ended', resolve));
          } catch(e2) {}
        }
      }

      isProcessingSpeech = false;
      isSpeaking = false;
      setStatus('Idle — waiting for chat');

      // Process next in queue if any
      if (speechQueue.length > 0) {
        processNextSpeech();
      }
    }

    // ── Idle behavior ──
    function startIdleBehavior() {
      // Random expressions
      setInterval(() => {
        if (!head) return;
        const moods = ['neutral', 'happy', 'hopeful', 'shy'];
        const mood = moods[Math.floor(Math.random() * moods.length)];
        try {
          head.setMood(mood);
        } catch (e) {}
      }, 15000);

      // Random gestures
      setInterval(() => {
        if (!head) return;
        const gestures = [null, 'handup', 'side', 'shrug'];
        const gesture = gestures[Math.floor(Math.random() * gestures.length)];
        try {
          if (gesture) {
            head.playGesture(gesture, 2.0);
          }
        } catch (e) {}
      }, 20000);

      // Simulate viewer count changes
      setInterval(() => {
        const base = 847;
        const delta = Math.floor(Math.random() * 200) - 50;
        document.getElementById('viewer-count').textContent = (base + delta).toLocaleString() + ' viewers';
      }, 30000);

      // No fake chat — real viewers only
    }

    // ── UI helpers ──
    function addChatMessage(user, text, color = '#fff') {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg';
      if (user === 'System') {
        div.innerHTML = `<span class="chat-system">${text}</span>`;
      } else {
        div.innerHTML = `<span class="chat-user" style="color:${color}">${user}:</span>${text}`;
      }
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    // ── Feed poller — picks up Twitch chat messages from backend ──
    let lastFeedId = 0;
    let feedSourceMessages = new Set(); // track messages we sent ourselves to avoid dupes

    function startFeedPoller() {
      setInterval(async () => {
        try {
          const resp = await fetch(agentApiUrl + '/feed?since=' + lastFeedId);
          const data = await resp.json();

          if (data.messages && data.messages.length > 0) {
            for (const msg of data.messages) {
              lastFeedId = Math.max(lastFeedId, msg.id);

              // Skip messages we sent from this UI (already displayed)
              if (msg.message && feedSourceMessages.has(msg.message)) {
                feedSourceMessages.delete(msg.message);
                continue;
              }

              // Display the viewer's message in chat (skip idle, they have no viewer msg)
              if (msg.message && !msg.is_idle) {
                const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];
                const color = colors[msg.username.length % colors.length];
                addChatMessage(msg.username, msg.message, color);
              }

              // Speak Aria's response with lip sync
              if (msg.response && msg.audio_url) {
                lastChatTime = Date.now();
                if (msg.mood && head) {
                  try { head.setMood(msg.mood); } catch(e) {}
                }
                await speakResponse(msg.response, msg.audio_url);
              }
            }
          }

          if (data.latest_id !== undefined) {
            lastFeedId = Math.max(lastFeedId, data.latest_id);
          }
        } catch (e) {
          // Backend might be down, ignore
        }
      }, 2000); // Poll every 2 seconds
    }

    // ── Idle talk — Aria speaks when chat is quiet ──
    let lastChatTime = Date.now();
    let isSpeaking = false;

    function startIdleTalk() {
      setInterval(async () => {
        const silenceMs = Date.now() - lastChatTime;
        // Only if chat quiet for 30+ seconds AND not speaking AND no queued speech
        if (silenceMs > 30000 && !isSpeaking && !isProcessingSpeech && speechQueue.length === 0) {
          try {
            const resp = await fetch(agentApiUrl + '/idle');
            const data = await resp.json();
            if (data.response) {
              lastChatTime = Date.now(); // Reset timer immediately to prevent double-fire
              await speakResponse(data.response, data.audio_url);
            }
          } catch (e) {
            console.error('Idle talk error:', e);
          }
        }
      }, 20000); // Check every 20 seconds
    }

    // Track when user sends a message
    const origSendChat = sendChat;

    // Load voices
    if (window.speechSynthesis) {
      speechSynthesis.getVoices();
      speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }
  </script>
</head>

<body>
  <div id="container">
    <!-- Avatar panel -->
    <div id="avatar-panel">
      <div id="topbar">
        <div id="live-dot"></div>
        <span id="live-text">LIVE</span>
        <span id="streamer-name">Aria — Just Chatting</span>
        <span id="viewer-count">847 viewers</span>
      </div>
      <div id="avatar"></div>
      <div id="debug"></div>
      <div id="status">Loading...</div>
      <div id="loading">Initializing...</div>
    </div>

    <!-- Chat panel -->
    <div id="chat-panel">
      <div id="chat-header">Stream Chat</div>
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input id="chat-input" type="text" placeholder="Send a message...">
        <button id="chat-send">Chat</button>
      </div>
    </div>
  </div>
</body>
</html>
